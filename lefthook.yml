pre-commit:
  commands:
    lint-staged:
      glob: "*.{ts,js,json}"
      run: npx lint-staged
    block-env:
      glob: ".env*"
      run: |
        echo "BLOCKED: .env files must not be committed" && exit 1
    block-secrets:
      run: |
        if git diff --cached --diff-filter=d | grep -qE 'KOULIS_API_TOKEN=|sk-'; then
          echo "BLOCKED: staged diff contains secrets (KOULIS_API_TOKEN= or sk-)" && exit 1
        fi
